name: Generate data.json

on:
  push:
    paths:
      - 'exam/data/*.json'
      - '!exam/data/data.json'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate data.json
        run: |
          cd exam/data
          echo "[" > data.json
          first=true
          for f in *.json; do
            # Skip files starting with _ and data.json itself
            case "$f" in
              _*|data.json) continue ;;
            esac
            if [ "$first" = false ]; then
              echo "," >> data.json
            fi
            first=false
            # Extract id, title, description, duration (summary only)
            id="${f%.json}"
            title=$(python3 -c "import json; d=json.load(open('$f','r',encoding='utf-8')); print(d.get('title',''))" 2>/dev/null || echo "")
            desc=$(python3 -c "import json; d=json.load(open('$f','r',encoding='utf-8')); print(d.get('description',''))" 2>/dev/null || echo "")
            dur=$(python3 -c "import json; d=json.load(open('$f','r',encoding='utf-8')); print(d.get('duration',0))" 2>/dev/null || echo "0")
            qcount=$(python3 -c "import json; d=json.load(open('$f','r',encoding='utf-8')); print(len(d.get('questions',[])))" 2>/dev/null || echo "0")
            echo "  {\"id\":\"$id\",\"title\":\"$title\",\"description\":\"$desc\",\"duration\":$dur,\"questionCount\":$qcount}" >> data.json
          done
          echo "]" >> data.json
          echo "Generated data.json:"
          cat data.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exam/data/data.json
          git diff --staged --quiet || (git commit -m "Auto-generate data.json" && git push)
